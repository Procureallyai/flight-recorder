name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test product packages
        run: pnpm test

      - name: Test genuine synthetic remediation
        run: npm test --prefix demo/password-reset-workspace

      - name: Regenerate deterministic fixtures
        run: |
          pnpm demo:generate
          pnpm candidate:generate
          git diff --exit-code -- fixtures/demo-passport/passport.json fixtures/demo-session/passport-candidate.json

      - name: Verify signed fixture
        run: pnpm verify

      - name: Scan public files for secrets
        run: pnpm security:secrets

      - name: Validate canonical truth
        run: pnpm validate:truth
